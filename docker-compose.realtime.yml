services:
  redis:
    image: redis:7-alpine
    container_name: dublancer-redis
    command:
      - redis-server
      - --appendonly
      - "yes"
      - --maxmemory-policy
      - noeviction
    ports:
      - "6379:6379"
    volumes:
      - dublancer_redis_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  dublancer_redis_data:
