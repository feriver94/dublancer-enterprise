services:
  postgres:
    image: postgres:16-alpine
    container_name: dublancer-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: dublancer
      POSTGRES_USER: dublancer
      POSTGRES_PASSWORD: change-me
    ports: ["5432:5432"]
    volumes: ["dublancer_postgres_data:/var/lib/postgresql/data"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dublancer -d dublancer"]
      interval: 10s
      timeout: 5s
      retries: 5
volumes:
  dublancer_postgres_data:
